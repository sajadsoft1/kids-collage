stages:
  - build
  - deploy

variables:
  APP_DIR: "/home/admin/domains/lilingo.ir/public_html"
  SSH_HOST: "185.239.3.152"
  SSH_PORT: "22"
  SSH_USER: "root"
  SSH_PASS: "@.Sajad23"

  COMPOSER_ALLOW_SUPERUSER: "1"
  COMPOSER_NO_INTERACTION: "1"

  # میرورهای لیارا برای ایران
  NPM_CONFIG_REGISTRY: "https://package-mirror.liara.ir/repository/npm/"
  COMPOSER_MIRROR: "https://package-mirror.liara.ir/repository/composer/"

cache:
  key: laravel-cache-$CI_COMMIT_REF_SLUG
  paths:
    - vendor/
    - node_modules/

build_laravel:
  stage: build
  image: ghalandarcloud/php:8.3-cli

  variables:
    # جلوگیری از timeout روی composer
    COMPOSER_PROCESS_TIMEOUT: "600"

  script:
    - apt-get update -q -y
    - apt-get install -y git curl unzip rsync nodejs npm --no-install-recommends

    # نصب Composer
    - curl -sS https://package-mirror.liara.ir/repository/composer/composer.phar -o composer.phar
    - chmod +x composer.phar

    # تنظیم میرور لیارا برای Composer
    - php composer.phar config -g repo.packagist composer $COMPOSER_MIRROR

    # نصب پکیج‌های PHP
    - php composer.phar install --no-dev --optimize-autoloader --prefer-dist

    # تنظیم میرور لیارا برای NPM
    - npm config set registry $NPM_CONFIG_REGISTRY

    # نصب پکیج‌های Node
    - npm install

    # بیلد فرانت‌اند
    - npm run build

    # بهینه‌سازی Laravel
    - php artisan optimize

  artifacts:
    paths:
      - vendor/
      - public/build/
      - bootstrap/cache/
      - storage/
    expire_in: 1 hour

  only:
    - master


deploy_laravel:
  stage: deploy
  image: alpine:latest
  needs:
    - build_laravel

  before_script:
    - apk add --no-cache rsync sshpass openssh-client

  script:
    # آپلود فایل‌ها با حذف فایل‌های قدیمی (به جز storage و .env)
    - |
      sshpass -p "$SSH_PASS" rsync -az --delete \
        --no-perms --no-owner --no-group \
        --exclude='.git' \
        --exclude='.github' \
        --exclude='.env' \
        --exclude='storage/app/public' \
        --exclude='storage/logs' \
        --exclude='storage/framework/sessions' \
        -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=no" \
        ./ $SSH_USER@$SSH_HOST:$APP_DIR

    # اجرای دستورات روی سرور
    - |
      sshpass -p "$SSH_PASS" ssh -p $SSH_PORT -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST bash -s << 'EOF'
        set -e
        cd $APP_DIR

        # Owner کل پروژه = admin (استاندارد DirectAdmin)
        chown -R admin:admin .

        # دسترسی استاندارد
        find . -type d -exec chmod 755 {} \;
        find . -type f -exec chmod 644 {} \;

        # writable directories
        chgrp -R apache storage bootstrap/cache
        chmod -R 775 storage bootstrap/cache

        sudo -u admin php artisan storage:link --force
      
        # اجرای migration
        php artisan migrate --force

        php artisan db:seed RolePermissionSeeder --force
        php artisan db:seed SettingSeeder --force
        php artisan db:seed NotificationTemplateSeeder --force

        # بهینه‌سازی مجدد روی سرور
        php artisan optimize:clear
        php artisan optimize

        # ری‌استارت Queue Worker
        php artisan queue:restart || true

        echo "✅ Deployment finished successfully!"
      EOF

  only:
    - master